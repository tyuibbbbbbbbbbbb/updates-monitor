name: Scrape Updates

on:
  schedule:
    - cron: "*/10 * * * *"   # כל 10 דקות
  workflow_dispatch:           # אפשר להפעיל ידנית
  push:
    branches: [main]
    paths:
      - "scraper.js"
      - "sources.js"
      - "scripts/scrape.js"
      - ".github/workflows/scrape.yml"

permissions:
  contents: write

concurrency:
  group: scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci --omit=dev || npm install --omit=dev

      - name: Scrape
        run: node scripts/scrape.js

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/)" ]; then
            git add data/
            git commit -m "chore(data): update [skip ci] $(date -u +'%Y-%m-%dT%H:%MZ')"
            git push
          else
            echo "No changes."
          fi
